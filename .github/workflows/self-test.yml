name: FeatureMap Self-Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run FeatureMap (heuristic mode)
        uses: ./
        with:
          faultline-version: local
          days: "365"
          max-commits: "1000"
          github-token: ${{ secrets.GITHUB_TOKEN }}

  self-test-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run FeatureMap (with quality gate)
        uses: ./
        with:
          faultline-version: local
          days: "365"
          max-commits: "500"
          fail-on-health-below: "10"
          github-token: ${{ secrets.GITHUB_TOKEN }}
