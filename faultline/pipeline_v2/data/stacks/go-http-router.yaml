stack: go-http-router
display_name: Go HTTP Router (chi/gin/echo/fiber/std/httprouter)

# Activation: any of these stack slugs (set by Stage 0 heuristic or
# Stage 0.5 auditor) will fire the go_router extractor.
detection:
  any:
    - audited_stack_prefix: "go-"
    - stack_equals: "go"
    - secondary_stack_equals: "go"

file_glob: "**/*.go"

# Path-prefix excludes — applied as ``starts_with`` against the
# POSIX-normalised tracked file path. Vendored deps, tests, and
# generated mocks should never produce routes.
excludes:
  - "vendor/"
  - "node_modules/"
  - ".git/"

# Suffix excludes — Go test files end with ``_test.go``.
exclude_suffixes:
  - "_test.go"

# One block per supported router. The extractor compiles each pair
# of regexes once at construction time.
router_patterns:
  chi:
    router_constructor: 'chi\.NewRouter\(\)'
    route_call: '\.(Get|Post|Put|Patch|Delete|Head|Options|Connect|Trace|Method|Handle|HandleFunc)\(\s*"([^"]+)"'
  gin:
    router_constructor: 'gin\.(Default|New)\(\)'
    route_call: '\.(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS|Any|Handle)\(\s*"([^"]+)"'
  echo:
    router_constructor: 'echo\.New\(\)'
    route_call: '\.(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS|Any)\(\s*"([^"]+)"'
  fiber:
    router_constructor: 'fiber\.New\(\)'
    route_call: '\.(Get|Post|Put|Patch|Delete|Head|Options|All)\(\s*"([^"]+)"'
  stdlib_http:
    router_constructor: 'http\.NewServeMux\(\)'
    route_call: '\.(HandleFunc|Handle)\(\s*"([^"]+)"'
  httprouter:
    router_constructor: 'httprouter\.New\(\)'
    route_call: '\.(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS|Handle|HandlerFunc)\(\s*"([^"]+)"'

# Confidence policy. When the router constructor is visible in the
# SAME FILE as the route call, this is the canonical "router root"
# file and we trust the signal more.
confidence:
  with_constructor_in_file: 0.9
  without_constructor_in_file: 0.7

# ── ARMED Go extraction (FAULTLINE_GO_EXTRACTION, default OFF) ───────────────
# This whole block is consulted ONLY when the flag is ON. With it OFF the
# extractor uses exactly the ``router_patterns`` above (byte-identical to the
# shipped board), so unset is a no-op.
#
# The armed block fixes two shipped defects on real Go repos (traefik VERIFIED):
#
#  1. FALSE POSITIVES — the chi/gin/echo ``route_call`` patterns match any bare
#     ``.Get("s")`` / ``.Set("s")`` / ``.Handle("s")``. Go code is saturated
#     with ``req.Header.Get("Content-Type")``, ``h.Set("X-Forwarded-For")``,
#     ``vals.Get("status")`` — so header names and JSON keys mint as
#     "features" (traefik: 19/19 go-router anchors were header garbage). The
#     ``route_must_be_path`` policy requires every matched string to be a URL
#     PATH: it starts with ``/`` OR with an HTTP-method token then a space and
#     ``/`` (the Go 1.22 net/http ServeMux pattern ``"GET /items/{id}"``). A
#     header name or JSON key is NOT a path — scale-invariant, no vocabulary.
#
#  2. MISSING ROUTER — gorilla/mux (and its ``containous/mux`` fork, traefik's
#     router) registers via a fluent chain ``router.Methods(..).Path("/x").
#     HandlerFunc(..)`` / ``.PathPrefix("/x")``; the path lives in ``.Path`` /
#     ``.PathPrefix``, never in a verb method. Without this signature traefik's
#     entire ``/api/**`` + ``/debug/**`` surface is invisible.
#
# dev-artifact law: fixtures / examples never mint product routes.
armed:
  route_must_be_path: true
  exclude_segments:
    - testdata
    - examples
    - example
  # Router signatures trusted ONLY under the flag. These are ADDED to the
  # base ``router_patterns`` above (the base set stays active, now filtered
  # by ``route_must_be_path`` so its header false positives are dropped).
  router_patterns:
    gorilla_mux:
      router_constructor: 'mux\.NewRouter\(\)'
      route_call: '\.(Path|PathPrefix|HandleFunc|Handle)\(\s*"(/[^"]*)"'
