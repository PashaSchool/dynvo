# background-jobs.yaml — grammar VOCABULARY for the B67 jobs/cron entry
# extractor (``faultline.pipeline_v2.extractors.jobs_entries``).
#
# Runtime copy packaged here; authoring copy mirrored at
# ``eval/stacks/background-jobs.yaml`` (local-only, untracked — same manual
# dual-copy convention as the other stacks/ files). Keep the two byte-identical.
#
# WHY (B67 / B63 meter, 192 unseen): background/cron handlers are not in
# ``routes_index`` — their flows/journeys never mint, so system capabilities
# (sync / digest / cleanup / billing-cron) are invisible. This file holds the
# per-grammar STRUCTURAL patterns (decorator / call signatures) and the
# corroboration vocabulary (required library imports, name-suffixes to strip,
# artifact dirs to skip). The MECHANISM (dispatch, identity derivation, dedup,
# emission) lives in the Python module; this file is data only — no tuned
# numbers, no repo-specific paths (rule-no-magic-tuning / rule-no-repo-paths).
#
# B64 literal law: an identity is only taken from a STATIC source token — a
# class/function name (always literal) or a STRING-LITERAL queue/task name.
# A queue/task name that is a variable or member expression (twenty's
# ``@Processor(MessageQueue.cronQueue)``, onyx's ``@shared_task(name=Onyx...)``)
# is an honest skip for the *name meta* only; the entry is still emitted keyed
# on the class/function name. Truly dynamic registrations (no static
# class/function, name is a free variable) emit nothing.

# Confidence carried on every emitted AnchorCandidate (explicit author intent —
# a decorated/declared handler is a high-precision signal when present).
confidence: 0.85

# Files whose job-like signatures are NOT product entries. Test/mock/fixture
# files are handled by the shared ``is_test_path`` predicate; this list adds the
# artifact classes that predicate does NOT cover (storybook, examples,
# playground, demos, samples). Matched as an exact path SEGMENT (never a
# substring — ``sampleService`` is not ``sample``).
skip_path_segments:
  - __stories__
  - stories
  - storybook
  - examples
  - example
  - playground
  - playgrounds
  - demo
  - demos
  - sample
  - samples
  - fixtures
  - fixture
  - mocks
  - mock
  - __generated__
  - generated
# Filename dot-component markers (``foo.stories.ts`` -> component ``stories``).
skip_filename_markers:
  - stories
  - story

# ── Seg A — TS / JS ─────────────────────────────────────────────────────────
ts_js:
  extensions: [".ts", ".tsx", ".mts", ".cts", ".js", ".jsx", ".mjs", ".cjs"]
  # Class/queue name suffixes stripped to reach the capability slug.
  suffix_strip: [CronJob, Job, Cron, Worker, Processor, Consumer, Handler, Scheduler, Task]
  grammars:
    # NestJS / BullMQ ``@Processor`` on a class (twenty: 85 handlers).
    # The queue argument is usually a member expr (MessageQueue.cronQueue) —
    # identity is the CLASS name; queue meta only when a string literal.
    processor:
      decorator_re: '@Processor\b'
      class_re: '(?:export\s+)?(?:abstract\s+)?class\s+([A-Za-z_$][\w$]*)'
      queue_literal_re: '@Processor\(\s*[''"]([^''"]+)[''"]'
      cron_hint_re: '\.cron\.|@Cron\b|SentryCronMonitor|CronExpression|CronPattern|CRON_PATTERN'
      method: JOB
    # BullMQ ``new Worker("queue", handler)`` — requires a bullmq import so a
    # DOM/web ``new Worker(new URL(...))`` never false-positives.
    bullmq_worker:
      require_import_re: 'from\s+[''"]bullmq[''"]|require\(\s*[''"]bullmq[''"]\s*\)'
      call_re: 'new\s+Worker\s*(?:<[^>]*>)?\(\s*[''"]([^''"]+)[''"]'
      method: JOB
    # node-cron ``cron.schedule("* * * * *", handler)`` — requires a node-cron
    # import. Identity is the bound variable name when present, else file stem.
    node_cron:
      require_import_re: 'node-cron|from\s+[''"]cron[''"]|require\(\s*[''"](?:node-)?cron[''"]\s*\)'
      call_re: '(?:(?:const|let|var)\s+([A-Za-z_$][\w$]*)\s*=\s*)?\b(?:cron|nodeCron)\.schedule\s*\(\s*[''"]([^''"]+)[''"]'
      method: CRON
    # agenda ``agenda.define("job name", ...)`` and bree job registration.
    agenda:
      call_re: '\bagenda\.define\s*\(\s*[''"]([^''"]+)[''"]'
      method: JOB
    # Seg D — Trigger.dev v3 (papermark 18, midday part): ``task({id: "...",
    # run})`` (JOB) / ``schedules.task({id: "...", cron, run})`` (CRON) —
    # import-corroborated (@trigger.dev/sdk). Identity = the literal ``id:``
    # (the author's declared task identity); a member-expr id is an honest
    # meta-skip — the entry falls back to the bound const name; neither
    # static token -> no emission (B64 literal law). The bare ``task(`` form
    # uses a negative lookbehind so ``schedules.task`` / ``myTask(`` /
    # ``x.task(`` never match it.
    trigger_dev:
      require_import_re: '@trigger\.dev/'
      scheduled_call_re: '(?:(?:export\s+)?(?:const|let|var)\s+([A-Za-z_$][\w$]*)\s*=\s*)?\bschedules\.task\s*\(\s*\{'
      task_call_re: '(?:(?:export\s+)?(?:const|let|var)\s+([A-Za-z_$][\w$]*)\s*=\s*)?(?<![.\w$])task\s*\(\s*\{'
      id_literal_re: 'id\s*:\s*[''"]([^''"]+)[''"]'
      scheduled_method: CRON
      task_method: JOB

# ── Seg B — Python ──────────────────────────────────────────────────────────
python:
  extensions: [".py"]
  # snake_case name suffixes stripped to reach the capability slug
  # (``export_query_history_cleanup_task`` -> ``export_query_history_cleanup``).
  suffix_strip: ["_task", "_job", "_cron", "_worker", "_scheduler"]
  grammars:
    # Celery ``@shared_task`` / ``@app.task`` / ``@celery_app.task`` (plane 30,
    # onyx 24). The decorator may span lines (``@shared_task(name=..., ...)``);
    # identity is the decorated FUNCTION name; the ``name=`` kwarg is meta only
    # when a string literal (onyx's ``name=OnyxCeleryTask.X`` is a member expr
    # -> honest skip, entry still emitted on the function name — B64 law).
    celery:
      require_import_re: '\bcelery\b|\bshared_task\b'
      decorator_re: '@(?:shared_task|[A-Za-z_][\w.]*\.task)\b'
      def_re: 'def\s+([A-Za-z_]\w*)\s*\('
      name_literal_re: 'name\s*=\s*[''"]([^''"]+)[''"]'
      method: JOB
    # APScheduler ``@scheduled_job(...)`` decorator and
    # ``scheduler.add_job(func, "cron"|"interval", ...)`` — import-corroborated.
    apscheduler:
      require_import_re: 'apscheduler'
      decorator_re: '@(?:[A-Za-z_][\w.]*\.)?scheduled_job\b'
      def_re: 'def\s+([A-Za-z_]\w*)\s*\('
      add_job_re: '\.add_job\s*\(\s*([A-Za-z_][\w.]*)'
      method: CRON
    # RQ ``@job(...)`` decorator — strict rq import corroboration (``@job`` is
    # a generic decorator name).
    rq:
      require_import_re: 'from\s+rq\b|\bimport\s+rq\b|\brq\.'
      decorator_re: '@job\b'
      def_re: 'def\s+([A-Za-z_]\w*)\s*\('
      method: JOB
    # django-q ``async_task("mod.func", ...)`` (JOB) / ``schedule("mod.func",
    # ...)`` (CRON) — strict django_q import corroboration; identity = the last
    # segment of the literal dotted function path.
    django_q:
      require_import_re: 'django_q|django-q'
      async_task_re: '\basync_task\s*\(\s*[''"]([\w.]+)[''"]'
      schedule_re: '\bschedule\s*\(\s*[''"]([\w.]+)[''"]'

# ── Seg C — manifest cron (markers, NOT duplicates) ─────────────────────────
manifests:
  # Vercel ``crons[]`` — each entry's ``path`` is (almost always) an EXISTING
  # api/cron route. system_flows already stamps those routes ``scheduled`` from
  # the same vercel.json, so this extractor emits NOTHING for a cron path that
  # resolves to a tracked route file (marker, not a duplicate entry — the
  # SACRED dup-vercel-cron anti-case). A cron path with NO tracked route file
  # (an orphan target) DOES get a CRON entry keyed on the path.
  vercel:
    filenames: ["vercel.json"]
    crons_key: "crons"
    path_key: "path"
    # Route roots a "/api/cron/x" path may resolve to (Next app/pages router).
    route_roots: ["app", "pages", "src/app", "src/pages"]
    route_leaves: ["route.ts", "route.js", "route.tsx", "route.jsx"]
  # GitHub Actions scheduled workflows — a NEW scheduled entry keyed on the
  # workflow ``name`` (or file stem). NOT a route file, so no dedup concern.
  github_actions:
    dir_marker: ".github/workflows/"
    extensions: [".yml", ".yaml"]
    method: CRON
  # Kubernetes ``CronJob`` — a NEW scheduled entry keyed on ``metadata.name``.
  k8s_cronjob:
    extensions: [".yml", ".yaml"]
    kind: "CronJob"
    method: CRON
