# Client-side SPA router grammar — consumed by the SpaRouterExtractor
# (faultline/pipeline_v2/extractors/spa_router.py, B65-v3).
#
# Two mechanisms, one flag (FAULTLINE_SPA_ROUTER_ENTRIES), one source
# slug (``spa-page``):
#
#   Seg A — vue file-based pages (vite-plugin-pages / unplugin-vue-router
#     in a non-Nuxt Vue SPA; Nuxt-style ``_param`` AND bracket ``[param]``
#     dynamics). Pure path arithmetic over ``pages/**/*.vue`` — the file
#     path encodes the URL. Nuxt trees self-skip (the filesystem
#     RouteFileExtractor's ``nuxt`` grammar already owns them).
#   Seg B — react-router route config parsed from code: JSX
#     ``<Route path=...>`` trees (nested paths joined) and
#     ``createBrowserRouter``/``createHashRouter``/``createMemoryRouter``
#     object arrays. The mounted element resolves through the file's own
#     imports to its entry file; a ``lazy: () => import(...)`` target IS
#     the entry (B37 lazy-dispatch bridge). Next / Remix / react-router
#     FRAMEWORK-mode repos disqualify (their pages are already covered
#     by filesystem extractors — SACRED no-dup law).
#
# "Mechanisms not vocabularies": dep markers below ACTIVATE a mechanism;
# they are not per-repo name dictionaries. All paths POSIX. Adding a
# convention = edit here, no Python change.

confidence: 0.8

# Shared artifact-class skips (mirrors server-api-entries.yaml — the
# stories/tests/examples classes the shared test-strip predicate does
# not fully cover). Segment match is EXACT, never a substring.
skip_path_segments:
  - storybook
  - stories
  - examples
  - example
  - playground
  - demo
  - demos
  - sample
  - samples
  - generated
skip_filename_markers:
  - stories
  - story
  - test
  - spec
  - cy
  - e2e

# ── Seg A — vue file-based pages ─────────────────────────────────────────
vue:
  # ANY match in dependencies OR devDependencies of the root / any
  # workspace / any shallow tracked package.json activates Seg A
  # (vite-plugin-pages is conventionally a devDependency).
  dep_markers:
    - vue-router
    - vite-plugin-pages
    - unplugin-vue-router
  # Routing-root component runs, matched ANYWHERE in the path (monorepo
  # workspace prefixes are transparently stripped). Longest-first.
  roots:
    - ["src", "pages"]
    - ["pages"]
  suffix: ".vue"
  # Leaf stems that carry no URL segment (the directory tree is the URL).
  index_stems:
    - index

# ── Seg B — react-router code config ─────────────────────────────────────
react_router:
  dep_markers:
    - react-router-dom
    - react-router
  # Framework-mode / Next / Remix disqualifiers — those stacks' pages are
  # covered by existing filesystem extractors; parsing their embedded
  # react-router widgets would double-count (SACRED no-dup law).
  disqualify_deps_exact:
    - next
  disqualify_dep_prefixes:
    - "@react-router/"
    - "@remix-run/"
  disqualify_config_files:
    - "react-router.config."
  # Whole-file pre-filter markers — only files mentioning one of these
  # are read + parsed (skips the bulk of a TS/JS repo cheaply).
  file_markers:
    - "<Route"
    - createBrowserRouter
    - createHashRouter
    - createMemoryRouter
  extensions:
    - .tsx
    - .jsx
    - .ts
    - .js
  # Import-specifier alias prefixes that map to a repo-local module (the
  # dominant Vite/tsconfig convention ``@/`` → ``src/``). Resolution is
  # by unique suffix-match against tracked files, so the exact alias
  # target dir is not needed.
  local_alias_prefixes:
    - "@/"
    - "~/"
  # Element components that are redirects, not page surfaces — a route
  # whose INNERMOST element is one of these is skipped (not a page).
  redirect_components:
    - Navigate
    - Redirect
  # Framework-suffix strip for the component-name slug fallback
  # ("HomePage" → "home" when the route path has no static segment).
  component_suffix_strip:
    - Page

# ── Seg D (B74 Seg A) — SPA route-table extraction ───────────────────────
# Exported enum / flat const-object whose string values are route-like
# (probe canon 2026-07-20: >=3 values, >=0.8 route-like ratio; a leading
# '/' is a PRIOR, never a gate — twenty SettingsPath slash_ratio 0.0 is
# consumption-primary and MUST be taken). EMISSION gate is load-bearing:
# >=1 member consumed in path-position (``path=`` / ``path:``) inside a
# file carrying a router marker below. Owner map resolves the consuming
# route's element/component to its page file (wrapper/fallback filtered,
# lazy-import bridged); table values without a direct Route are emitted
# as pattern anchors WITHOUT an owner, attributed to the table's first
# consuming router file (nav-alias law + IT2 container guard: the
# declaring ws-pkg is evidence, never a capability). Flag
# FAULTLINE_SPA_ROUTE_TABLE, default OFF.
route_table:
  extensions:
    - .ts
    - .tsx
    - .js
    - .jsx
    - .vue
    - .mts
    - .cts
    - .mjs
    - .cjs
  # Artifact-class skips BEYOND the shared skip_path_segments list
  # (probe canon dirs the shared list does not carry). Exact segment
  # match, never substring — consumed ONLY by the route-table arm.
  extra_skip_segments:
    - __generated__
  # Dotted filename markers beyond the shared list (``.d.ts``
  # declaration files are type surface, never a route table).
  extra_skip_filename_markers:
    - d
  # Router-marker corroboration — the consumption gate's file predicate.
  # A ``from '<pkg>'`` import of one of these packages OR any marker
  # substring qualifies a file as a router file.
  router_import_packages:
    - react-router
    - react-router-dom
    - vue-router
    - "@tanstack/react-router"
    - "@solidjs/router"
    - wouter
    - svelte-routing
    - preact-router
  router_markers:
    - "<Route"
    - createRoutesFromElements
    - "useRoutes("
    - createBrowserRouter
    - createHashRouter
    - createMemoryRouter
    - RouteRecordRaw
    - RouterProvider
  # Elements that are wrappers / plumbing, never the page owner (probe
  # patches: ``fallback={...}`` props are stripped; a bare ``Route`` is
  # excluded). A route owned only by these emits its pattern WITHOUT an
  # owner file.
  wrapper_components:
    - LazyRoute
    - Navigate
    - Suspense
    - Outlet
    - Fragment
    - Redirect
    - React
    - ErrorBoundary
    - Route
    - Routes
  # Lazy-binding callees whose import() target IS the page entry
  # (B37 lazy-dispatch bridge; twenty uses lazyWithPreload).
  lazy_callees:
    - lazy
    - lazyWithPreload
  # Same alias-resolution convention as Seg B (unique suffix-match).
  local_alias_prefixes:
    - "@/"
    - "~/"
  # Component-name slug fallback for patterns with no static segment.
  component_suffix_strip:
    - Page
