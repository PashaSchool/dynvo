# Naming-contract vocabulary (Product-Spine §4.8, Wave 3).
#
# Universal display-name material — SaaS-ecosystem-wide, never tuned to
# any one repo (rule-no-magic-tuning). Consumed by
# faultline/pipeline_v2/naming_contract.py; authoring copy lives at
# eval/naming-contract-vocab.yaml (byte-identical, drift-guarded by
# tests/pipeline_v2/test_naming_contract.py).
version: 1

