# The journey grammar (PM-Labeler compose surface + deterministic
# templates). A composed journey display must start with one of these
# verb phrases; the remainder is validated by token evidence
# (naming_validator) against the entity's own files/routes/strings.
journey_verb_phrases:
  - Browse & filter
  - Browse
  - Bulk-manage
  - Complete
  - Configure
  - Connect
  - Create & edit
  - Create
  - Export
  - Import
  - Ingest
  - Install
  - Manage
  - Monitor
  - Receive
  - Review
  - Run
  - Search
  - Send
  - Set up
  - Sign in to
  - Track
  - Transition
  - Trigger
  - Unsubscribe from
  - Upload
  - Verify
  - View

# Member-flow verb evidence → journey intent verdict for synthesized /
# twin user flows. First matching class by flow-name token wins
# (deterministic order below); "manage" is the fallback class.
flow_verb_classes:
  connect:
    - auth
    - authorize
    - callback
    - connect
    - install
    - link
    - oauth
    - register
    - setup
  ingest:
    - crawl
    - fetch
    - import
    - index
    - ingest
    - poll
    - pull
    - sync
  send:
    - deliver
    - dispatch
    - notify
    - post
    - publish
    - send
    - share
  receive:
    - consume
    - inbound
    - listen
    - receive
    - webhook
  run:
    - build
    - execute
    - invoke
    - process
    - run
    - schedule
    - trigger
  view:
    - browse
    - display
    - get
    - list
    - read
    - render
    - show
    - view

# Journey display templates per intent verdict. "{v}" = vendor / hub
# subject display, "{r}" = resource phrase (lowercased PF display).
journey_templates:
  vendor:
    connect: "Connect {v}"
    ingest: "Ingest data from {v}"
    send: "Send notifications via {v}"
    receive: "Receive events from {v}"
    run: "Run {v} jobs"
    view: "View {v} data"
    manage: "Manage {v} integration"
  generic:
    connect: "Connect {r}"
    ingest: "Ingest {r}"
    send: "Send {r}"
    receive: "Receive {r}"
    run: "Run {r}"
    view: "View {r}"
    manage: "Manage {r}"

# Generic connector-container segments (the §4.4 hub lexicon) — skipped
# when deriving a hub FAMILY display word ("backend/services/edr" names
# the EDR family, never a "Services" one). Same universal list class as
# the spine vocab's hub families.
hub_container_segments:
  - adapters
  - channels
  - connectors
  - destinations
  - handlers
  - integrations
  - plugins
  - providers
  - routers
  - services
  - sources

# Structural path segments never used as display words when humanizing
# a route/anchor id (they locate code, they don't name capabilities).
structural_segments:
  - app
  - apps
  - backend
  - frontend
  - index
  - lib
  - packages
  - pages
  - routes
  - server
  - src
  - web
  - www

# URL tenancy-scope segments (mirrors spine-anchor-vocab tenant_scope_
# segments — kept local to the display vocab so naming stays self-
# contained). Consumed ONLY by the route-template humanizer
# (FAULTLINE_HUMANIZE_ROUTE_NAMES): a scope word whose next URL segment
# is a dynamic param is tenant ADDRESSING and drops when a DEEPER
# meaningful segment exists (`/workspaces/{id}/tables` → "Tables"); a
# scope word that is the terminal capability still keys its surface
# (`/t/$teamUrl` → "Team"). Tiny universal vocabulary (rule-no-magic-
# tuning): scope words only.
tenant_scope_segments:
  - workspace
  - workspaces
  - org
  - orgs
  - organization
  - organizations
  - team
  - teams
  - tenant
  - tenants
  - account
  - accounts

# Addressing-suffix tokens stripped from a DYNAMIC route param when
# deriving its human noun ($teamUrl → "team", $documentId → "document",
# $id/$slug/$token → nothing = pure addressing, transparent). Universal
# URL-identifier vocabulary; never repo-specific.
route_addressing_suffixes:
  - id
  - url
  - slug
  - token
  - uuid
  - guid
  - key
  - ref
  - hash
  - pk
  - handle
  - code
  - name

# Compose bounds for labeler-composed displays (grammar hard limits).
compose_max_words: 8
compose_max_chars: 60

# R5-4 (2026-07-19) — dev-scaffold route words that may lead a composed
# "<base> (<qual>)" display only as the TRAILING qualifier: a single
# scaffold-word base with a non-verb noun qualifier inverts to noun-lead
# ("New (Webhooks)" -> "Webhooks — New"; "Edit (Monitors)" ->
# "Monitors — Edit"). Universal CRUD-scaffold vocabulary, never
# repo-specific. Anti-cases (must NOT invert): a multi-word base
# ("Upload File (upload)"), a verb-led qualifier ("List (View data)").
scaffold_lead_words:
  - add
  - create
  - detail
  - details
  - edit
  - index
  - list
  - new
  - view

# B78 Seg H (2026-07-21) — side-effect flow families for the
# FAULTLINE_DOMINANT_EVIDENCE_NAMING ratio gate (dominant_evidence.py).
# A member flow whose LEADING name token names a cross-cutting
# side-effect action (audit-write / telemetry / cache / log) rides along
# most journeys as plumbing; its evidence never GIFTS words to the
# journey's display (Soc0 'Create, manage, and audit labels' — 'audit'
# backed by 1/11 members, an audit-write rider). CORROBORATION ONLY:
# the mechanism is the ratio gate — this closed set merely marks which
# members are excluded from support numerators (they stay in the
# denominator). Closed set, exact leading-token match only
# (journey_step_leaf_tokens discipline — no fuzzy/substring matching).
# ANTI-CASES (must survive; unit-pinned):
#   * a journey ABOUT auditing ('View audit logs', resource='audit-log')
#     keeps its words — resource-grounded tokens are exempt from the
#     gate entirely, so this exclusion can never erase a journey's own
#     identity;
#   * 'track' stays OUT — issue/shipment tracking is a product action
#     (twenty / plane class);
#   * 'record' stays OUT — products record meetings/videos (cal class);
#   * 'monitor' stays OUT — uptime monitoring IS a product;
#   * 'trace' stays OUT — traces are a first-class resource in LLM
#     observability products (langfuse class).
# Known cost accepted: a 'log-out-*' flow (leading token 'log') is
# misread as a log-write rider; it merely stops gifting words — 'sign' /
# 'out' evidence still arrives from the sibling auth members.
side_effect_flow_families:
  audit-write:
    - audit
  telemetry:
    - instrument
    - telemetry
  cache:
    - cache
  log:
    - log
