# Product-Spine §4.3 (Wave 2b) — anchor-builder vocabulary.
#
# SINGLE SOURCE OF TRUTH for the spine anchor-candidate builder
# (faultline/pipeline_v2/spine_anchors.py). Authoring copy:
# eval/spine-anchor-vocab.yaml (drift-guarded by
# tests/pipeline_v2/test_spine_anchors.py). Anything hardcoded in
# Python instead of here is a bug (house rule, stack-pattern-library).
#
# Every token is a UNIVERSAL web/repo convention — never a repo name.

# Structural-vocabulary stoplist (calibration trap #1, 2026-07-06):
# schema/i18n NAME-MATCHING may never match framework-structural
# vocabulary. Measured failure: drizzle table `apps` name-matched the
# `apps/` workspace root + Next `app/` dirs and claimed whole repos at
# share 1.0 (midday i/p/r/s swallowed by a phantom mega-anchor);
# supabase table `page` = same class against `pages/` routers.
structural_stoplist:
  - app
  - apps
  - page
  - pages
  - src
  - lib
  - libs
  - api
  - apis
  - component
  - components
  - service
  - services
  - model
  - models
  - store
  - stores
  - module
  - modules
  - util
  - utils
  - helper
  - helpers
  - hook
  - hooks
  - type
  - types
  - config
  - configs
  - core
  - shared
  - common
  - internal
  - public
  - static
  - asset
  - assets
  - style
  - styles
  - test
  - tests
  - doc
  - docs
  - script
  - scripts
  - route
  - routes
  - router
  - routers
  - view
  - views
  - schema
  - schemas
  - migration
  - migrations
  - server
  - client
  - web
  - frontend
  - backend
  - packages
  - package
  - data
  - main
  - index
  - base
  - user            # near-universal table name; matches auth/user dirs everywhere
  - session         # same class (auth/session infra dirs)
  - account         # same class (auth scaffolding) — route anchors still carry it

# URL segments that are TRANSPARENT when deriving a route anchor's key
# (they organise the URL, they are not the capability): matched exactly.
route_transparent_segments:
  - api
  - trpc
  - rest
  - graphql

# URL TENANCY-SCOPE segments (W4, the tracecat Workspaces class —
# hybrid tenancy): a pure scope word whose NEXT URL segment is a
# dynamic param is tenant ADDRESSING, not a capability —
# `/workspaces/{ws_id}/tables` is the TABLES surface. The segment is
# transparent ONLY in that shape and ONLY when a deeper meaningful
# segment exists; a literal `/workspaces` index or `/workspaces/{id}`
# detail page still keys the Workspaces surface. Tiny universal
# vocabulary on purpose (rule-no-magic-tuning): scope words only.
tenant_scope_segments:
  - workspace
  - workspaces
  - org
  - orgs
  - organization
  - organizations
  - team
  - teams
  - tenant
  - tenants

# Version-dir pattern (calibration trap: `v1` @0.50 borderline —
# linkwarden V1/V2 class). A version segment NEVER names an anchor; it
# is transparent when deeper segments exist, and a version-KEYED anchor
# folds into its parent API surface instead of minting.
version_segment_pattern: "^v\\d+$"

# Authored feature-dir containers (rider R1, source 5): a
# `<container>/<domain>/` dir is the author's own capability
# declaration (papermark ee/features/*, Soc0 frontend/src/features/*).
feature_dir_containers:
  - features
  - feature
  - modules
  - module

# Domain-service-dir containers (rider R1, source 6): backend service
# organisation (`backend/services/<domain>/`). LINEAGE-ONLY class —
# a service dir never standalone-mints a product feature (operator
# acceptance case: Soc0 widget-query); it widens a same-key capability
# or its devs take the fold ladder.
service_dir_containers:
  - services
  - service

# Workspace-shell first segments: a workspace whose path starts here is
# a DEPLOYMENT SHELL (ws-app class, rider R1 — shells never mint).
workspace_shell_roots:
  - apps
  - app

# Workspace paths containing one of these segments are excluded from
# anchor building entirely (calibration: skip type=example ONLY —
# `type=tool` workspaces hold real product surfaces, e.g. midday
# packages/cli, the published-CLI doctrine).
workspace_excluded_segments:
  - example
  - examples

# Python-package domain discovery guards (W2b.1 fix b — the onyx class:
# a python monolith keeps its domains as `<top_pkg>/<domain>/` packages,
# `__init__.py`-marked). A dir whose ANY segment matches below never
# participates in package-domain discovery (universal noise classes:
# vendored envs, test trees, generated caches).
pypkg_guard_segments:
  - test
  - tests
  - testing
  - site-packages
  - node_modules
  - venv
  - virtualenv
  - vendor
  - third_party
  - dist
  - build
  - __pycache__

# Manifest files that mark a top-level dir as a deployment unit in a
# non-workspace repo (Soc0 backend/ + frontend/ class) — such units are
# shells (never mint), used for shell-lineage accounting only.
unit_manifest_files:
  - package.json
  - pyproject.toml
  - setup.py
  - requirements.txt
  - go.mod
  - Cargo.toml
  - composer.json
  - Gemfile

# Hub-family child dirs with these names are PLUMBING (core), never a
# vendor child, even inside a dir-per-vendor hub.
hub_plumbing_segments:
  - base
  - common
  - shared
  - core
  - utils
  - util
  - helpers
  - types
  - schema
  - schemas
  - mock
  - mocks
  - testing
  - fixtures
  - factory
  - interfaces
  - interface

# File extensions that count as SOURCE CODE for the hub child-mint bar
# (operator amendment 2026-07-06: a vendor child mints on >=1 flow OR
# own code; a SINGLE STATIC file — json/yaml/sql config class, the
# supabase FDW-wrapper case — never mints).
code_extensions:
  - .py
  - .ts
  - .tsx
  - .js
  - .jsx
  - .mjs
  - .cjs
  - .go
  - .rs
  - .rb
  - .java
  - .kt
  - .php
  - .ex
  - .exs
  - .cs
  - .vue
  - .svelte

# B33 (2026-07-11) — journey-step / plumbing devgrain-leaf tokens for the
# route/fdir mint gate (faultline/pipeline_v2/stage_6_86_anchored_mint.py
# ``_mint_bar``). A route:/fdir:-anchored leaf whose normalized key names a
# plumbing screen or a journey STEP (a welcome screen, an onboarding step, an
# access-denied page) is journey-grain by construction — never a standalone
# product capability — so it folds via the existing _parent_fold rail instead
# of minting a flowless devgrain PF. CORROBORATION ONLY (never kills alone):
# the gate fires solely when the candidate carries NO nav (IA) declaration
# (``nav_confirmed`` false) AND the board's nav parse is readable; a
# nav-declared leaf (kan/midday Onboarding, novu Error) is product by the
# author's word and is NEVER gated. Closed set (B30 discipline) — no fuzzy /
# substring matching; the leaf's ``-page``/``-screen``/``-view`` surface
# suffix is stripped once (b8c domain-family precedent) before matching.
# SEPARATE from structural_stoplist / hub_plumbing_segments: those bar
# unconditionally, these bar only without nav confirmation.
journey_step_leaf_tokens:
  # Exact normalized-leaf membership (plumbing screens + journey steps).
  exact:
    - access-denied
    - callback
    - error
    - getting-started
    - loading
    - logout
    - maintenance
    - not-found
    - onboarding
    - redirect
    - signout
    - unauthorized
    - usecase-select
    - welcome
  # First ``-``-token match (redirect-* compounds, e.g.
  # redirect-to-legacy-studio-auth).
  prefix:
    - redirect
  # Last ``-``-token match (*-callback / *-onboarding / *-redirect compounds,
  # e.g. oauth-callback, aws-marketplace-onboarding, enter-redirect).
  suffix:
    - callback
    - onboarding
    - redirect

# B58 Seg B (2026-07-13) — dev-artifact WORKSPACE-UNIT tokens. Fires ONLY
# at unit-ROOT grain (the segments of the workspace unit's root path, or
# the top-level dir for evidence outside every unit) inside the
# FAULTLINE_ANNEXATION_GUARD mint bar: a whole APP the maintainer parks
# under playground/ / examples/ (novu pnpm-workspace.yaml declares
# 'playground/*' — "# playground apps") is a dev artifact, never a product
# surface. Deliberately DISTINCT from dev_artifact_tokens
# (surface-scope-patterns.yaml): that list is page/path-grain corroboration
# where `playground` is measured OUT (cal.com ships a REAL product admin
# page named playground — Lane-C claim table). At unit-root grain the
# cal.com counterfactual cannot fire (its unit root is apps/web), so
# playground is safely IN here. Scope per the B58 operator mandate:
# playground/examples/demo/sample only (docs/mocks/fixtures stay with the
# B28 structural prongs).
unit_root_artifact_tokens:
  - playground
  - playgrounds
  - example
  - examples
  - demo
  - demos
  - sample
  - samples
