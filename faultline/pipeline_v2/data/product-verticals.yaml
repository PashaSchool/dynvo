      - email
      - realtime

# ── Fallback vertical (never matched — assigned when no rule wins) ────
# Kept in the same file so display/audience live in ONE vocabulary.
fallback:
  id: generic-saas
  display: General SaaS
  audience: end users & teams

# ── Core-object stopwords ──────────────────────────────────────────────
# Tokens that never NAME the product's core object because every web
# app has them: tenancy/auth/app chrome + URL plumbing. Structural web
# conventions only — never a domain noun, never a repo-specific word.
# (Domain-ish nouns like invoice/task/document are deliberately NOT
# here — for the right repo they ARE the product.)
core_object_stopwords:
  # URL / transport plumbing
  - api
  - graphql
  - trpc
  - rpc
  - rest
  - internal
  - public
  - static
  - assets
  - health
  - healthz
  - ping
  - status
  - callback
  - webhook
  - webhooks
  - cron
  - embed
  - preview
  - proxy
  - redirect
  - og
  - sitemap
  - robots
  # auth chrome (the auth CAPABILITY is not a core object)
  - auth
  - oauth
  - sso
  - login
  - logout
  - signin
  - signup
  - sign-in
  - sign-up
  - sign-out
  - register
  - password
  - session
  - token
  - me
  # tenancy / account chrome
  - user
  - account
  - organization
  - org
  - team
  - member
  - workspace
  - profile
  - settings
  - preferences
  - admin
  - onboarding
  - invite
  - invitation
  - notification
  # app shell / marketing chrome
