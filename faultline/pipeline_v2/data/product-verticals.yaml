# Stage 0.8 product thesis — vertical lexicon.
#
# Single source of truth for the deterministic product-thesis stage
# (``faultline/pipeline_v2/stage_0_8_product_thesis.py``). Maps SIGNAL
# COMBINATIONS (domain-noun families + dep-anchor categories) to a
# product vertical. Authoring copy: ``eval/product-verticals.yaml``;
# runtime copy: ``faultline/pipeline_v2/data/product-verticals.yaml``
# (drift-guarded byte-identical, house pattern).
#
# UNIVERSALITY RULES (rule-no-magic-tuning; mirrors dependency-anchors):
#
#   1. Noun families are the INDUSTRY-STANDARD domain language of the
#      vertical — the words the whole industry uses for that domain's
#      objects (an invoice is an invoice in every finance product) —
#      NEVER a specific repo's coinage and NEVER a repo/product name.
#   2. Families that are universal SaaS chrome are deliberately absent:
#      user, team, organization, workspace, member, session, settings,
#      notification, dashboard, template, plan... Every SaaS has them,
#      so they discriminate nothing (they are handled by the
#      core-object stopword list below instead).
#   3. A family may be multi-part (``event-type``): it matches only
#      when its parts appear contiguously in the signal token's parts,
#      so ``event`` alone (analytics events, webhook events) can never
#      fire a scheduling rule.
#   4. ``deps`` reference dep-anchor CATEGORY slugs (the
#      ``stage1_anchors`` vocabulary in dependency-anchors.yaml).
#      IS-vs-USES trap: importing posthog makes a repo an analytics
#      *user*, not an analytics *product* — so dep evidence only ever
#      CORROBORATES a vertical that already cleared the noun-family
#      minimum in code; it can never establish one. Keep these lists
#      short and only where the category genuinely co-occurs with the
#      vertical's money path.
#
# Verticals are decided by ranked evidence count in code (see
# ``derive_product_thesis``); exact ties and no-evidence repos fall
# back to ``generic-saas``. Adding a vertical = add an entry here, no
# Python change.

verticals:
  security-operations:
    display: Security operations
    audience: security & SOC teams
    nouns:
      - alert
      - detection
      - detector
      - incident
      - case
      - threat
      - vulnerability
      - finding
      - playbook
      - ioc
      - cve
      - investigation
      - remediation
      - misconfiguration
      - siem
      # W3.1 D3 (fb3 tracecat) — SOAR industry vocabulary: the
      # detection-side nouns above miss automation-first SOC products
      # (workflows+cases grain). Nouns stay industry-standard.
      - soar
      - secops
      - triage
      - enrichment
      - runbook
    # W3.1 D3 — the SOAR "integrations security context": a product whose
    # integration catalog clusters in security vendors speaks the
    # domain's language at catalog scale (tracecat: crowdstrike, splunk,
    # panther, wazuh, virustotal, ... 20+ under templates/tools +
    # integrations/). See integration_vendor_categories below.
    vendor_category: security
    deps: []

  compliance-grc:
    # W3.1 D3 (fb3 comp) — security compliance / GRC platforms
    # (Vanta/Drata/comp class). Nouns are the ISO-27001/SOC-2 industry
    # standard objects; `isms`/`soa` are unambiguous GRC acronyms.
    display: Compliance & GRC
    audience: compliance & security teams
    nouns:
