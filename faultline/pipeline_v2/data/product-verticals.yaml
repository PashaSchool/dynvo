    deps: []

  forms-surveys:
    display: Forms & surveys
    audience: survey creators & respondents
    nouns:
      - form
      - survey
      - response
      - question
      - answer
      - submission
      - respondent
      - questionnaire
      - quiz
      - poll
    deps: []

  e-commerce:
    display: E-commerce
    audience: merchants & shoppers
    nouns:
      - order
      - cart
      - checkout
      - catalog
      - inventory
      - sku
      - shipment
      - fulfillment
      - storefront
      - discount
      - coupon
      - variant
      - warehouse
      - merchant
    deps:
      - billing

  analytics:
    display: Analytics
    audience: product & growth teams
    nouns:
      - funnel
      - cohort
      - metric
      - insight
      - pageview
      - heatmap
      - retention
      - segment
      - kpi
      - tracking
      - conversion
    deps: []

  dev-tools:
    display: Developer tools
    audience: developers & platform teams
    nouns:
      - deployment
      - repository
      - api-key
      - secret
      - migration
      - sdk
      - cli
      - branch
      - commit
      - build
      - registry
      - container
      - database
      - sql
      - replication
      - function
      - runtime
      - sandbox
    deps: []

  communication:
    display: Communication
    audience: senders & recipients
    nouns:
      - message
      - email
      - inbox
      - thread
      - conversation
      - chat
      - channel
      - campaign
      - broadcast
      - sms
      - mention
      - contact
