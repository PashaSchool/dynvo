# Layer 2 product clusterer — dependency → product label map.
#
# Single source of truth for Sprint B3's Rule 2 (dependency anchor
# clustering). Each entry maps a category slug to:
#   - deps: list of npm/pip/cargo dependency name patterns (exact match
#     OR token-prefix; see _dep_matches in faultline.pipeline_v2.extractors.package
#     for the same matching algorithm)
#   - product_label: customer-facing TitleCase label that becomes the
#     product feature name when any developer feature's paths import
#     one of these deps
#   - name_aliases: (Sprint Rails H3) list of substrings that, when
#     present in the developer feature's slug (kebab-case) OR in any
#     of its file-path basenames, authorise this cluster to claim
#     that feature. Without this guard, a Rails app with a Stripe
#     gem would fold every unanchored model (Address, Property, …)
#     into "Billing" purely because the dep exists somewhere in the
#     repo. The guard requires the feature's NAME to actually carry
#     a semantic signal of the category before the dep-anchor claims
#     it. Aliases are case-insensitive substrings.
#
# Stack-agnostic: a Python repo importing `stripe` and a Node repo
# importing `stripe` both produce a "Billing" product feature.
#
# Adding a new product label = add an entry here, no Python change.
# Per the hard rule: dep → product mappings live in YAML, never in
# Python.

billing:
  deps:
    - stripe
    - "@stripe/*"
    - paddle
    - "@paddle/*"
    - paddle-sdk
    - lemonsqueezy.js
    - "@lemonsqueezy/*"
    - polar
    - "@polar-sh/*"
  product_label: Billing
  name_aliases:
    - billing
    - payment
    - subscription
    - invoice
    - checkout
    - charge
    - plan
    - stripe
    - paddle
    - polar
    - price

