# UF ground truth for novu
# Curated by: uf-spec-curator agent
# Source date: 2026-06-20
# Confidence levels:
#   external  = derived from product website / pricing / docs (highest)
#   route     = derived from code routes / nav components (medium)
#   inferred  = LLM-inferred from schema + code structure (lowest)

meta:
  slug: novu
  product_url: https://novu.co
  docs_url: https://docs.novu.co
  sources_used:
    - external_site            # novu.co homepage + pricing
    - nestjs_controllers       # apps/api/src/app/<domain>/*.controller.ts
    - react_router_routes      # apps/dashboard/src/utils/routes.ts ROUTES const
    - nav_component            # apps/dashboard/src/components/side-navigation/side-navigation.tsx
    - worker_jobs              # apps/worker/src/app/* background processors
  curator_notes: |
    Novu is open-source notification infrastructure. Signal here was unusually
    rich and convergent: the dashboard exposes an explicit author-curated ROUTES
    constant (utils/routes.ts) AND a grouped sidebar (Agents / Notifications /
    Data / Monitor / Developer / Platform), which together give a precise
    customer-facing taxonomy that matches the marketing site (novu.co) and
    pricing page almost 1:1 — so most UFs carry confidence: external or route.

    Domain modeling decisions:
    - The NestJS API has ~66 controllers across ~56 folders, but many are
      versioned twins (workflows-v1/v2, topics-v1/v2, layouts-v1/v2,
      subscribers/subscribers-v2, environments-v1/v2) or internal plumbing
      (shared, internal, keyless, cli-auth, step-resolvers, blueprint, change,
      bridge, testing, health, widgets, message-template, content-templates,
      feeds, notification-groups). Versioned twins are collapsed into ONE
      customer-facing domain. Internal/plumbing controllers are NOT customer
      flows and are deliberately excluded (engine may emit them — that is a
      precision penalty against the engine, not a curation gap).
    - "events" controller (POST /trigger, /trigger/bulk, /trigger/broadcast)
      is the core "send a notification" surface — modeled under the
      notifications domain as customer trigger flows, plus a no-ui worker job
      for actual delivery processing (apps/worker).
    - Agents / Novu Connect (Claude managed agents into Slack/Email/Discord)
      is a newer top-level nav area; included as its own domain at route
      confidence (visible in sidebar + agents.tsx pages, lighter external signal).
    - Webhooks split into outbound-webhooks (customer subscribes to Novu events)
      and the dashboard /webhooks area with endpoints/event-catalog/logs tabs.
    - Known gap: admin/internal-only flows (rate-limiting, support, internal
      blueprint sync) omitted by design — no external customer signal.

