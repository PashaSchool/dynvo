# UF ground truth for inbox-zero
# Curated by: uf-spec-curator
# Source date: 2026-06-14
#
# Product: Inbox Zero — open-source AI email assistant / inbox cleaner
# (by Elie Steinbock). Next.js 15 App Router monorepo; web app at apps/web/.
#
# Confidence levels:
#   external  = derived from product website / pricing / docs (highest)
#   route     = derived from code routes / nav components (medium)
#   inferred  = LLM-inferred from schema + code structure (lowest)
#
# Category (custom field for this repo — lets the scorer split the two worlds):
#   interactive = a human-driven UI journey (has a page / panel / settings UI)
#   system      = a background / async / scheduled / webhook-triggered flow
#                 (no user-facing page; ui_tier: no-ui). inbox-zero runs these
#                 via vercel.json crons + Upstash QStash queues + inbound
#                 provider webhooks. NOTE: this repo does NOT use Inngest
#                 (the brief assumed Inngest) — the real background-job stack
#                 is QStash (Upstash) + BullMQ + Vercel Cron. Each meaningful
#                 job below is grounded in a concrete cron entry, a
#                 withQstashOrInternal-guarded route, or a verified webhook
#                 handler.

meta:
  slug: inbox-zero
  product_url: https://www.getinboxzero.com
  docs_url: https://docs.getinboxzero.com
  sources_used:
    - external_site          # getinboxzero.com homepage + /pricing
    - external_docs          # docs.getinboxzero.com sidebar
    - next_app_router        # apps/web/app/(app)/**/page.tsx + app/api/**/route.ts
    - nav_component          # apps/web/components/SideNav.tsx (Manage/Cleanup/Tools groups)
    - prisma_schema          # apps/web/prisma/schema.prisma (60+ models)
    - vercel_cron            # apps/web/vercel.json crons[] (8 scheduled jobs)
  curator_notes: |
    Strong, well-triangulated signal. Four independent sources agreed on the
    product taxonomy: the marketing site + pricing page, the public docs
    sidebar, the App-Router routes, and the in-app SideNav component (which
    groups features into Manage / Cleanup / Tools — the author's own UX
    taxonomy). Marketing names map almost 1:1 onto code routes (e.g.
    /bulk-unsubscribe, /cold-email-blocker, /reply-zero, /smart-categories,
    /clean, /briefs, /drive, /stats), so most interactive flows are
    confidence=external or route with high certainty.

    BACKGROUND / SYSTEM FLOWS (the focus of this curation): inbox-zero is a
    background-heavy product. The brief asked for Inngest functions, but this
    repo does NOT use Inngest — it uses **Upstash QStash** (HTTP queues),
    **BullMQ**, and **Vercel Cron**. I enumerated system flows from three
    grounded code sources rather than from any single library:
      (1) vercel.json `crons[]` — 8 explicit author-declared schedules;
      (2) routes guarded by `withQstashOrInternal` (utils/qstash.ts) — these
          are async job *consumers* invoked by QStash (or internal fallback);
      (3) verified inbound webhook handlers (Gmail/Outlook history push,
          Slack/Telegram/Teams chat events, Stripe/Lemon Squeezy/Apple billing).
    Each system flow carries its trigger (cron schedule, queue topic, or
    webhook source) in its rationale so the scorer can verify grounding.

    Deliberate exclusions:
      - Pure dev/debug pages (app/(app)/[emailAccountId]/debug/**), the
        (redirects) route group (legacy URL forwarders), and (landing)
        component-preview pages — not customer flows.
      - Low-level CRUD-only JSON endpoints under /api/user/** that merely back
        a page already represented (e.g. /api/user/rules backs the Assistant
        rule editor) — folded into the parent UF, not split out, per the
        marketing-grain rule.
      - Admin-only pages (/admin, /config) — represented as a single thin
        "platform administration" flow; no external signal for sub-journeys.

    Known gaps vs likely engine output: the engine works at engineering grain
    and will almost certainly emit far more UFs than this list (per-endpoint
    splits of stats/*, drive/*, categorize/senders/*, organization stats
    buckets, the v1 public API, MCP integration OAuth, calendar/drive OAuth
    callbacks). Per [[rule-no-truth-recuration-to-fit-engine]] that gap is the
    measurement, not a curation defect — this spec stays at marketing grain.

